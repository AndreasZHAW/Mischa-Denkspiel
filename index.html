<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#87CEEB">
  <title>Das Mischa Denkspiel ✈️</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
  <style>
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes starPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.4)}100%{transform:scale(1);opacity:1}}
    @keyframes circleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes floatUp{0%{transform:translateY(0) rotate(-3deg)}100%{transform:translateY(-14px) rotate(3deg)}}
    @keyframes popBurst{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.5}100%{transform:scale(0);opacity:0}}
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#87CEEB">
      <div style="text-align:center">
        <div style="font-size:3rem;animation:bounce 1s infinite">✈️</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:#3D4F2E;margin-top:10px">Mischa Denkspiel lädt...</div>
      </div>
    </div>
  </div>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- Core -->
  <script src="js/worlds.js"></script>
  <script src="js/firebase-state.js"></script>
  <!-- Games -->
  <script src="js/games/math.js"></script>
  <script src="js/games/reaction.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/train.js"></script>
  <script src="js/games/shutthebox.js"></script>
  <script src="js/games/jenga.js"></script>
  <script src="js/games/slider.js"></script>
  <script src="js/games/wordsearch.js"></script>
  <script src="js/games/typing.js"></script>
  <script src="js/games/balloon.js"></script>
  <script src="js/games/simon.js"></script>
  <script src="js/games/truefalse.js"></script>
  <script src="js/games/dart.js"></script>
  <script src="js/games/anagram.js"></script>
  <script src="js/games/colormix.js"></script>
  <script src="js/games/minigames.js"></script>
  <script src="js/shop.js"></script>
  <!-- App -->
  <script src="js/app.js"></script>
  <script>
    async function boot() {
      await new Promise(r => setTimeout(r, 500));

      // Start listening for real-time broadcast
      State.listenBroadcast(data => {
        const seen = sessionStorage.getItem('mischa_bc_seen');
        if (seen === data.id) return;
        sessionStorage.setItem('mischa_bc_seen', data.id);
        if (data.type === 'survey') showSurvey(data);
        else showBroadcastBanner(data.text);
      });

      // Start listening for real-time discounts
      State.listenDiscounts(() => {}); // syncs to localStorage automatically

      const ret = sessionStorage.getItem('mischa_current');
      if (ret) {
        const p = await State.getPlayer(ret);
        if (p) { State.setCurrentPlayer(p); App.showWorldMap(); return; }
      }
      App.showWelcome();
    }

    function showBroadcastBanner(text) {
      document.getElementById('bc-banner')?.remove();
      const b = document.createElement('div');
      b.id = 'bc-banner';
      b.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:9999;
        color:white;padding:8px 16px;text-align:center;
        font-family:'Fredoka One',cursive;font-size:0.95rem;
        text-shadow:0 1px 4px rgba(0,0,0,0.8);
        animation:slideDown 0.4s ease;pointer-events:auto`;
      b.innerHTML = `📢 <span style="font-size:0.88rem">${text}</span>
        <button onclick="document.getElementById('bc-banner').remove()"
          style="background:none;border:none;color:rgba(255,255,255,0.7);padding:2px 8px;
            cursor:pointer;margin-left:6px;font-size:0.82rem">✕</button>`;
      document.body.prepend(b);
      setTimeout(() => { b.style.transition='opacity 0.6s'; b.style.opacity='0'; setTimeout(()=>b.remove(),600); }, 5000);
    }

    function showSurvey(data) {
      document.getElementById('bc-survey')?.remove();
      const extra = data.extra || {};
      const surveyId = data.id;
      if (State.hasVoted(surveyId)) return;
      const s = document.createElement('div');
      s.id = 'bc-survey';
      s.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;
        max-width:320px;width:90%;animation:popIn 0.4s ease`;
      // 20 second countdown
      let timeLeft = 20;
      s.innerHTML = `
        <div style="color:white;text-align:center;margin-bottom:10px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;text-shadow:0 1px 4px rgba(0,0,0,0.8)">
            📊 ${data.text}
          </div>
          <div id="survey-timer" style="font-size:0.8rem;opacity:0.7;margin-top:2px">⏱ ${timeLeft}s</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button onclick="SurveyUI.vote('${surveyId}','a',this)"
            style="padding:16px 8px;border-radius:14px;border:none;cursor:pointer;
              background:rgba(39,174,96,0.85);color:white;font-family:'Fredoka One',cursive;
              font-size:0.95rem;backdrop-filter:blur(4px);text-shadow:0 1px 3px rgba(0,0,0,0.3)">
            ✅ ${extra.optA||'Ja'}
          </button>
          <button onclick="SurveyUI.vote('${surveyId}','b',this)"
            style="padding:16px 8px;border-radius:14px;border:none;cursor:pointer;
              background:rgba(231,76,60,0.85);color:white;font-family:'Fredoka One',cursive;
              font-size:0.95rem;backdrop-filter:blur(4px);text-shadow:0 1px 3px rgba(0,0,0,0.3)">
            ❌ ${extra.optB||'Nein'}
          </button>
        </div>`;
      document.body.appendChild(s);
      const tick = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('survey-timer');
        if (el) el.textContent = '⏱ ' + timeLeft + 's';
        if (timeLeft <= 0) { clearInterval(tick); s.remove(); }
      }, 1000);
    }

    const SurveyUI = {
      async vote(surveyId, choice, btn) {
        await State.voteSurvey(surveyId, choice);
        const s = document.getElementById('bc-survey');
        if (s) {
          s.innerHTML = `<div style="color:white;text-align:center;font-family:'Fredoka One',cursive;
            font-size:1rem;text-shadow:0 1px 4px rgba(0,0,0,0.8)">
            ✅ Danke für deine Stimme!</div>`;
          setTimeout(() => s.remove(), 2000);
        }
      }
    };
    window.SurveyUI = SurveyUI;
    window.showBroadcastBanner = showBroadcastBanner;
    window.showSurvey = showSurvey;

    document.addEventListener('DOMContentLoaded', () => setTimeout(boot, 500));
  </script>
  <style>
    @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</body>
</html>
