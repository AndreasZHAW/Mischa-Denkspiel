<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#87CEEB">
  <title>Das Mischa Denkspiel 🏔️</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
  <style>
    /* Extra animations for portal & jenga */
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)}
    }
    @keyframes starPop {
      0%{transform:scale(0);opacity:0} 60%{transform:scale(1.4)} 100%{transform:scale(1);opacity:1}
    }
    @keyframes circleIn {
      from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1}
    }
    @keyframes foundPop {
      0%{transform:scale(0.5)} 100%{transform:scale(1)}
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:2rem">
      🏔️ Laden...
    </div>
  </div>

  <!-- Core -->
  <script src="js/state.js"></script>
  <script src="js/worlds.js"></script>

  <!-- Games -->
  <script src="js/games/math.js"></script>
  <script src="js/games/reaction.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/train.js"></script>
  <script src="js/games/search.js"></script>
  <script src="js/games/differences.js"></script>
  <script src="js/games/shutthebox.js"></script>
  <script src="js/games/jenga.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>

  <!-- Boot -->
  <script>
    const ret = sessionStorage.getItem('mischa_current');
    if (ret) {
      const p = State.getPlayer(ret);
      if (p) { State.setCurrentPlayer(p); App.showWorldMap(); }
      else App.showWelcome();
    } else {
      App.showWelcome();
    }
  </script>
</body>
</html>
