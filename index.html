<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#87CEEB">
  <title>Das Mischa Denkspiel ✈️ v29</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
  <style>
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes starPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.4)}100%{transform:scale(1);opacity:1}}
    @keyframes circleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes floatUp{0%{transform:translateY(0) rotate(-3deg)}100%{transform:translateY(-14px) rotate(3deg)}}
    @keyframes popBurst{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.5}100%{transform:scale(0);opacity:0}}
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#87CEEB">
      <div style="text-align:center">
        <div style="font-size:3rem;animation:bounce 1s infinite">✈️</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:#3D4F2E;margin-top:10px">Mischa Denkspiel lädt...</div>
        <div id="load-status" style="font-size:.8rem;color:#555;margin-top:8px"></div>
      </div>
      <div id="error-box" style="display:none;margin-top:20px;background:rgba(231,76,60,.9);color:white;padding:16px 20px;border-radius:12px;max-width:350px;font-size:.85rem;text-align:left;word-break:break-word"></div>
      <button id="reload-btn" onclick="location.reload()" style="display:none;margin-top:16px;background:#2980B9;color:white;border:none;padding:10px 24px;border-radius:8px;font-size:1rem;cursor:pointer">↻ Neu laden</button>
    </div>
  </div>
  <!-- Firebase -->
  <!-- Firebase loads async - app works without it (localStorage fallback) -->
  <script>
    // Load Firebase async so it doesn't block page render
    window._firebaseLoadPromise = new Promise((resolve) => {
      const s1 = document.createElement('script');
      s1.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
        s2.onload = () => resolve(true);
        s2.onerror = () => resolve(false);
        document.head.appendChild(s2);
      };
      s1.onerror = () => resolve(false);
      document.head.appendChild(s1);
      // Timeout: if Firebase doesn't load in 3s, proceed without it
      setTimeout(() => resolve(false), 3000);
    });
  </script>
  <!-- Core -->
  <script src="worlds.js"></script>
  <script src="firebase-state.js"></script>
  <!-- Games -->
  <script src="math.js"></script>
  <script src="reaction.js"></script>
  <script src="memory.js"></script>
  <script src="train.js"></script>
  <script src="shutthebox.js"></script>
  <script src="jenga.js"></script>
  <script src="slider.js"></script>
  <script src="wordsearch.js"></script>
  <script src="typing.js"></script>
  <script src="balloon.js"></script>
  <script src="simon.js"></script>
  <script src="truefalse.js"></script>
  <script src="dart.js"></script>
  <script src="anagram.js"></script>
  <script src="colormix.js"></script>
  <script src="minigames.js"></script>
  <script src="shop.js"></script>
  <!-- App -->
  <script src="app.js"></script>
  <script>
    async function boot() {
      // STEP 1: Show welcome immediately (never block on network)
      const ret = sessionStorage.getItem('mischa_current');
      
      // Check local storage first (instant, no network)
      if (ret && typeof State !== 'undefined') {
        try {
          const localPlayer = State._local && State._local.get(ret);
          if (localPlayer) {
            State.setCurrentPlayer(localPlayer);
            App.showWorldMap();
            // Then try to refresh from cloud in background
            window._firebaseLoadPromise.then(() => {
              try { initFirebase(); State.getPlayer(ret).then(p => { if(p) State.setCurrentPlayer(p); }).catch(()=>{}); } catch(e) {}
            }).catch(()=>{});
            return;
          }
        } catch(e) {}
      }
      
      // No local player - show welcome screen IMMEDIATELY
      App.showWelcome();
      
      // Connect Firebase in background (doesn't block UI)
      window._firebaseLoadPromise.then(() => {
        try { initFirebase(); } catch(e) {}
        // Setup listeners after Firebase loads
        try { State.listenBroadcast(data => {
          const seen = sessionStorage.getItem('mischa_bc_seen');
          if (seen === data.id) return;
          sessionStorage.setItem('mischa_bc_seen', data.id);
          if (data.type === 'survey') showSurvey(data);
          else showBroadcastBanner(data.text);
        }); } catch(e) {}
        try { State.listenDiscounts(() => {}); } catch(e) {}
        // If user had a session, check cloud
        if (ret) {
          State.getPlayer(ret).then(p => {
            if (p && document.getElementById('app')?.innerHTML?.includes('Willkommen')) {
              State.setCurrentPlayer(p); App.showWorldMap();
            }
          }).catch(() => {});
        }
      }).catch(() => {});
    }

    function showBroadcastBanner(text) {
      document.getElementById('bc-banner')?.remove();
      const b = document.createElement('div');
      b.id = 'bc-banner';
      b.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:9999;
        color:white;padding:8px 16px;text-align:center;
        font-family:'Fredoka One',cursive;font-size:0.95rem;
        text-shadow:0 1px 4px rgba(0,0,0,0.8);
        animation:slideDown 0.4s ease;pointer-events:auto`;
      b.innerHTML = `📢 <span style="font-size:0.88rem">${text}</span>
        <button onclick="document.getElementById('bc-banner').remove()"
          style="background:none;border:none;color:rgba(255,255,255,0.7);padding:2px 8px;
            cursor:pointer;margin-left:6px;font-size:0.82rem">✕</button>`;
      document.body.prepend(b);
      setTimeout(() => { b.style.transition='opacity 0.6s'; b.style.opacity='0'; setTimeout(()=>b.remove(),600); }, 5000);
    }

    function showSurvey(data) {
      document.getElementById('bc-survey')?.remove();
      const extra = data.extra || {};
      const surveyId = data.id;
      if (State.hasVoted(surveyId)) return;
      const s = document.createElement('div');
      s.id = 'bc-survey';
      s.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;
        max-width:320px;width:90%;animation:popIn 0.4s ease`;
      // 20 second countdown
      let timeLeft = 20;
      s.innerHTML = `
        <div style="color:white;text-align:center;margin-bottom:10px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;text-shadow:0 1px 4px rgba(0,0,0,0.8)">
            📊 ${data.text}
          </div>
          <div id="survey-timer" style="font-size:0.8rem;opacity:0.7;margin-top:2px">⏱ ${timeLeft}s</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button onclick="SurveyUI.vote('${surveyId}','a',this)"
            style="padding:16px 8px;border-radius:14px;border:none;cursor:pointer;
              background:rgba(39,174,96,0.85);color:white;font-family:'Fredoka One',cursive;
              font-size:0.95rem;backdrop-filter:blur(4px);text-shadow:0 1px 3px rgba(0,0,0,0.3)">
            ✅ ${extra.optA||'Ja'}
          </button>
          <button onclick="SurveyUI.vote('${surveyId}','b',this)"
            style="padding:16px 8px;border-radius:14px;border:none;cursor:pointer;
              background:rgba(231,76,60,0.85);color:white;font-family:'Fredoka One',cursive;
              font-size:0.95rem;backdrop-filter:blur(4px);text-shadow:0 1px 3px rgba(0,0,0,0.3)">
            ❌ ${extra.optB||'Nein'}
          </button>
        </div>`;
      document.body.appendChild(s);
      const tick = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('survey-timer');
        if (el) el.textContent = '⏱ ' + timeLeft + 's';
        if (timeLeft <= 0) { clearInterval(tick); s.remove(); }
      }, 1000);
    }

    const SurveyUI = {
      async vote(surveyId, choice, btn) {
        await State.voteSurvey(surveyId, choice);
        const s = document.getElementById('bc-survey');
        if (s) {
          s.innerHTML = `<div style="color:white;text-align:center;font-family:'Fredoka One',cursive;
            font-size:1rem;text-shadow:0 1px 4px rgba(0,0,0,0.8)">
            ✅ Danke für deine Stimme!</div>`;
          setTimeout(() => s.remove(), 2000);
        }
      }
    };
    window.SurveyUI = SurveyUI;
    window.showBroadcastBanner = showBroadcastBanner;
    window.showSurvey = showSurvey;

    document.addEventListener('DOMContentLoaded', () => {
      const status = document.getElementById('load-status');
      const errBox = document.getElementById('error-box');
      const reloadBtn = document.getElementById('reload-btn');

      function showError(msg) {
        if (errBox) { errBox.style.display='block'; errBox.textContent='❌ Fehler: '+msg; }
        if (reloadBtn) reloadBtn.style.display='block';
        if (status) status.textContent='Fehler aufgetreten';
      }

      // Catch ALL global errors
      window.onerror = function(msg, src, line) {
        showError(msg + ' (' + (src||'').split('/').pop() + ':' + line + ')');
        return false;
      };
      window.onunhandledrejection = function(e) {
        showError('Promise: ' + (e.reason?.message || e.reason));
      };

      if (status) status.textContent = 'Skripte laden...';

      // Hard failsafe: 3 seconds max
      const failsafe = setTimeout(() => {
        if (document.getElementById('loading-screen')?.style.display !== 'none') {
          if (typeof App !== 'undefined') {
            try { App.showWelcome(); } 
            catch(e) { showError('showWelcome: ' + e.message); }
          } else {
            showError('App nicht geladen - bitte neu laden');
          }
        }
      }, 3000);

      boot()
        .then(() => clearTimeout(failsafe))
        .catch(e => { clearTimeout(failsafe); showError('Boot: ' + e.message); });
    });
  </script>
  <style>
    @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</body>
</html>
