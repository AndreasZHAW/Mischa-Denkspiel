<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Admin — Mischa Denkspiel</title>
  <link rel="stylesheet" href="main.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body{background:#0f1729;min-height:100vh;font-family:'Nunito',sans-serif}
    .aw{max-width:960px;margin:0 auto;padding:20px}
    .ah{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .at{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#FFD700;text-shadow:0 2px 8px rgba(255,215,0,0.3)}
    .lb{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:15px;padding:15px;margin-bottom:10px}
    .sl{font-family:'Fredoka One',cursive;font-size:1.1rem;color:white;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
    .sc{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px;text-align:center}
    .sv{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#FFD700}
    .sk{font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:3px}
    .pc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:16px;margin-bottom:12px;transition:border-color 0.2s}
    .pc:hover{border-color:rgba(255,215,0,0.2)}
    .pt{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    .pn{font-family:'Fredoka One',cursive;font-size:1.1rem;color:white}
    .pm{font-size:0.75rem;color:rgba(255,255,255,0.45);margin-top:2px}
    .ps{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#FFD700}
    .wb{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .wr{display:flex;align-items:center;gap:8px;font-size:0.75rem;color:rgba(255,255,255,0.55)}
    .wl{width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wt{flex:1;height:9px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden}
    .wf{height:100%;border-radius:50px;transition:width 0.5s}
    .wc{width:32px;text-align:right;font-size:0.7rem}
    .pa{display:flex;gap:6px;flex-wrap:wrap}
    .ba{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:0.75rem;font-weight:700;font-family:'Nunito',sans-serif;transition:all 0.15s}
    .ba:hover{transform:translateY(-1px)}
    .br{background:rgba(255,165,0,0.15);color:#FFA500;border:1px solid rgba(255,165,0,0.25)}
    .bd{background:rgba(231,76,60,0.15);color:#E74C3C;border:1px solid rgba(231,76,60,0.25)}
    .bg{background:rgba(39,174,96,0.15);color:#27AE60;border:1px solid rgba(39,174,96,0.25)}
    .bb{background:rgba(74,144,217,0.15);color:#4A90D9;border:1px solid rgba(74,144,217,0.25)}
    .be{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1)}
    .ds{display:none;margin-top:12px;border-top:1px solid rgba(255,255,255,0.07);padding-top:12px}
    .ds.open{display:block}
    .tg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px}
    .tp{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;cursor:default}
    .td{background:rgba(39,174,96,0.25);color:#27AE60;border:1px solid rgba(39,174,96,0.3)}
    .tj{background:rgba(255,165,0,0.2);color:#FFA500;border:1px solid rgba(255,165,0,0.25)}
    .te{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.07)}
    .lr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.03);margin-bottom:5px;border:1px solid rgba(255,255,255,0.05)}
    .login-box{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;text-align:center;max-width:380px;margin:80px auto}
    .login-box h2{color:#FFD700;font-family:'Fredoka One',cursive;font-size:1.5rem;margin-bottom:6px}
    .login-box p{color:rgba(255,255,255,0.55);margin-bottom:20px;font-size:0.85rem}
    .login-box input{width:100%;padding:11px 15px;border-radius:10px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:white;font-size:1rem;font-family:'Nunito',sans-serif;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#FFD700}
    .ab{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'Fredoka One',cursive;font-size:1rem;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;transition:transform 0.15s;width:100%}
    .ab-p{background:linear-gradient(135deg,#FFD700,#FFA500);color:#2C3E50}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
    .modal-box{background:#1a2640;border:2px solid rgba(255,255,255,0.12);border-radius:18px;padding:28px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
    .modal-box h3{font-family:'Fredoka One',cursive;color:white;font-size:1.3rem;margin-bottom:12px}
    .modal-box input,.modal-box select{width:100%;padding:10px 14px;border-radius:10px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:white;font-size:0.95rem;font-family:'Nunito',sans-serif;margin-bottom:10px;-webkit-appearance:none}
    .modal-box input:focus,.modal-box select:focus{outline:none;border-color:#FFD700}
    .modal-box label{display:block;font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
    .mbtns{display:flex;gap:8px;margin-top:4px}
    .mb-ok{flex:1;padding:10px;border-radius:50px;border:none;background:linear-gradient(135deg,#FFD700,#FFA500);color:#2C3E50;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer}
    .mb-cancel{flex:1;padding:10px;border-radius:50px;border:2px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.6);font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer}
  </style>
</head>
<body>
<div class="aw" id="admin-app"></div>
<div id="modal-area"></div>

<script src="js/worlds.js"></script>
<script src="firebase-state.js"></script>
<script>

const CEMOJIS = {spongebob:'🧽',patrick:'⭐',mario:'🍄',luigi:'💚',stickman:'🎨',woman:'👩',man:'👨',girl:'👧',boy:'👦',ninja:'🥷',astronaut:'🧑‍🚀',detective:'🕵️',princess:'👸',knight:'⚔️',scientist:'🧪',explorer:'🧭'};
const WCOLORS = ['#2980B9','#8E44AD','#27AE60','#E67E22','#E74C3C','#16A085','#D35400','#E30613','#7F8C8D','#2C3E50'];

const Admin = {
  // ---- LOGIN ----
  render() {
    document.getElementById('admin-app').innerHTML = `
      <div class="login-box">
        <div style="font-size:2.5rem">🔐</div>
        <h2>Admin</h2>
        <p>Mischa Denkspiel — Lehrerpanel</p>
        <input type="password" id="apw" placeholder="Admin-Passwort" onkeyup="if(event.key==='Enter')Admin.login()"/>
        <div class="ab ab-p" onclick="Admin.login()">Anmelden ➜</div>
        <div id="aerr" style="color:#E74C3C;margin-top:10px;font-size:0.85rem"></div>
        <div style="margin-top:14px;font-size:0.72rem;color:rgba(255,255,255,0.25)">Standard: mischa2024</div>
      </div>`;
  },

  async login() {
    const pw = document.getElementById('apw')?.value;
    if (State.checkAdmin(pw)) {
      await this.showDashboard();
    } else {
      document.getElementById('aerr').textContent = '❌ Falsches Passwort!';
    }
  },

  // ---- DASHBOARD ----
  async showDashboard() {
    document.getElementById('admin-app').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:60px">⏳ Lade Spieler...</div>';
    const all = await State.getAll();
    const players = Object.values(all);
    const totalScore = players.reduce((s,p)=>s+(p.totalScore||0),0);
    const worldsDone = players.reduce((s,p)=>s+Object.values(p.worlds||{}).filter(w=>w.completed).length,0);
    const ranked = [...players].sort((a,b)=>(b.totalScore||0)-(a.totalScore||0));

    document.getElementById('admin-app').innerHTML = `
      <div class="ah">
        <div class="at">🏆 Mischa Denkspiel — Admin</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="ba be" onclick="Admin.showChangePw()">🔑 PW ändern</button>
          <button class="ba bg" onclick="Admin.showDiscountPanel()">🏷️ Rabatte</button>
          <button class="ba bb" onclick="Admin.showBroadcast()">📢 Nachricht</button>
          <button class="ba bb" onclick="Admin.showSurveyPanel()" style="background:rgba(39,174,96,0.15);border-color:rgba(39,174,96,0.3);color:#27AE60">📊 Umfrage</button>
          <button class="ba bg" onclick="Admin.showZooPanel()" style="background:rgba(255,165,0,0.15);border-color:rgba(255,165,0,0.4);color:#FFD700">🦁 Zoo-Admin</button>
          <button class="ba be" onclick="Admin.showDashboard()">🔄 Aktualisieren</button>
          <a href="index.html" class="ba be" style="text-decoration:none">← Zum Spiel</a>
          <a href="zoo.html" class="ba bg" style="text-decoration:none;background:rgba(39,174,96,0.15);border-color:rgba(39,174,96,0.4);color:#27AE60">🦁 Zum Zoo</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="sr">
        <div class="sc"><div class="sv">${players.length}</div><div class="sk">👤 Spieler</div></div>
        <div class="sc"><div class="sv">${totalScore}</div><div class="sk">⭐ Gesamtpunkte</div></div>
        <div class="sc"><div class="sv">${players.length?Math.round(totalScore/players.length):0}</div><div class="sk">📊 Ø Punkte</div></div>
        <div class="sc"><div class="sv">${worldsDone}</div><div class="sk">🏆 Welten ✓</div></div>
      </div>

      <!-- Leaderboard -->
      <div class="sl">🥇 Rangliste (Top 20)</div>
      <div style="margin-bottom:22px">
        ${ranked.length===0
          ? '<div style="color:rgba(255,255,255,0.35);text-align:center;padding:20px">Noch keine Spieler</div>'
          : ranked.slice(0,20).map((p,i)=>{
              const icon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
              const age = new Date().getFullYear()-(p.birthYear||2000);
              const wdone = Object.values(p.worlds||{}).filter(w=>w.completed).length;
              return `<div class="lr">
                <div style="font-family:'Fredoka One',cursive;font-size:1rem;width:26px;text-align:center">${icon}</div>
                <span style="font-size:1.3rem">${CEMOJIS[p.character]||'🧭'}</span>
                <div style="flex:1">
                  <div style="color:white;font-weight:700;font-size:0.9rem">${p.name}</div>
                  <div style="font-size:0.7rem;color:rgba(255,255,255,0.4)">Welt ${p.currentWorld||1}/10 · ${wdone} ✓ · ${age}J</div>
                </div>
                <div style="font-family:'Fredoka One',cursive;color:#FFD700;font-size:0.95rem">⭐ ${p.totalScore||0}</div>
              </div>`;
            }).join('')
        }
      </div>

      <!-- All players -->
      <div class="sl">👥 Alle Spieler</div>
      ${players.length===0
        ? '<div style="color:rgba(255,255,255,0.35);text-align:center;padding:40px">Noch keine Spieler</div>'
        : players.map(p=>this.renderPlayer(p)).join('')
      }`;
  },

  renderPlayer(p) {
    const age = new Date().getFullYear()-(p.birthYear||2000);
    const totalTasks = Object.values(p.worlds||{}).flatMap(w=>w.tasks).filter(t=>t&&t.done).length;
    const created = new Date(p.createdAt||Date.now()).toLocaleDateString('de-CH');
    const updated = new Date(p.updatedAt||p.createdAt||Date.now()).toLocaleDateString('de-CH');

    return `<div class="pc">
      <div class="pt">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:1.6rem">${CEMOJIS[p.character]||'🧭'}</span>
          <div>
            <div class="pn">${p.name}</div>
            <div class="pm">${age} Jahre · ${p.birthYear} · Welt ${p.currentWorld||1}/10 · ${totalTasks}/100 Aufgaben<br>Dabei seit: ${created} · Aktiv: ${updated}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="ps">⭐ ${p.totalScore||0}</div>
        </div>
      </div>

      <!-- World bars -->
      <div class="wb">
        ${(WORLDS||[]).map((world,wi)=>{
          const ws = (p.worlds||{})[world.id]||{tasks:Array(10).fill(null),jokerUsed:false,completed:false};
          const done = ws.tasks.filter(t=>t&&t.done).length;
          const pct  = (done/10)*100;
          const wscore = ws.tasks.filter(t=>t&&t.done).reduce((s,t)=>s+(t.score||0),0);
          return `<div class="wr">
            <span class="wl">${world.icon} ${world.name}</span>
            <div class="wt"><div class="wf" style="width:${pct}%;background:${WCOLORS[wi]||'#5D6D7E'}"></div></div>
            <span class="wc">${done}/10</span>
            <span style="font-size:0.68rem;color:rgba(255,255,255,0.35)">⭐${wscore}</span>
            ${ws.completed?'<span style="color:#27AE60;font-size:0.75rem">✓</span>':''}
            ${ws.jokerUsed?'<span style="font-size:0.75rem">🃏</span>':''}
          </div>`;
        }).join('')}
      </div>

      <!-- Actions -->
      <div class="pa">
        <button class="ba bg" onclick="Admin.showAddPoints('${p.name}')">⭐ Punkte</button>
        <button class="ba bb" onclick="Admin.showSetWorld('${p.name}')">🌍 Welt setzen</button>
        <button class="ba bb" onclick="Admin.showResetTasks('${p.name}')">↩️ Aufgaben</button>
        <button class="ba br" onclick="Admin.resetFull('${p.name}')">🔄 Alles reset</button>
        <button class="ba be" onclick="Admin.toggleDetail('${p.name}')">📋 Detail</button>
            <button class="ba bg" onclick="Admin.showGiftReset('${p.name}')">🔄 Reset schenken</button>
        <button class="ba bd" onclick="Admin.deletePlayer('${p.name}')">🗑️ Löschen</button>
      </div>

      <!-- Detail -->
      <div class="ds" id="det-${p.name.replace(/\s/g,'_')}">
        ${(WORLDS||[]).map(world=>{
          const ws = (p.worlds||{})[world.id]||{tasks:Array(10).fill(null)};
          return `<div style="margin-bottom:10px">
            <div style="color:rgba(255,255,255,0.5);font-size:0.75rem;margin-bottom:4px">${world.icon} ${world.name}</div>
            <div class="tg">
              ${world.tasks.map((task,ti)=>{
                const t = ws.tasks[ti];
                if(!t||!t.done) return `<div class="tp te" title="Offen">${ti+1}</div>`;
                if(t.joker)    return `<div class="tp tj" title="Joker">🃏</div>`;
                const sec = t.timeMs?Math.round(t.timeMs/1000)+'s':'';
                const err = t.errors||0;
                return `<div class="tp td" title="${task.title}&#10;⭐${t.score} · ⏱${sec} · ❌${err}">${t.score||0}</div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  },

  toggleDetail(name) {
    document.getElementById('det-'+name.replace(/\s/g,'_'))?.classList.toggle('open');
  },

  // ---- MODALS ----
  _modal(html) {
    document.getElementById('modal-area').innerHTML = `<div class="modal" onclick="Admin._closeModal(event)">${html}</div>`;
  },
  _closeModal(e) { if(e.target.classList.contains('modal')) document.getElementById('modal-area').innerHTML=''; },
  _close() { document.getElementById('modal-area').innerHTML=''; },

  showAddPoints(name) {
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>⭐ Punkte für ${name}</h3>
      <label>Punkte (positiv = hinzufügen, negativ = abziehen)</label>
      <input type="number" id="m-pts" value="50" step="10"/>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._addPoints('${name}')">Speichern</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _addPoints(name) {
    const pts = parseInt(document.getElementById('m-pts')?.value||0);
    await State.addPoints(name, pts);
    this._close();
    await this.showDashboard();
  },

  showSetWorld(name) {
    const options = (WORLDS||Array.from({length:10},(_,i)=>({id:i+1,name:`Welt ${i+1}`,icon:'🌍'}))).map(w=>`<option value="${w.id}">${w.icon} ${w.name}</option>`).join('');
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>🌍 Welt setzen für ${name}</h3>
      <label>Aktuelle Welt</label>
      <select id="m-world">${options}</select>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._setWorld('${name}')">Speichern</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _setWorld(name) {
    const w = parseInt(document.getElementById('m-world')?.value||1);
    await State.setWorld(name, w);
    this._close();
    await this.showDashboard();
  },

  showResetTasks(name) {
    const worldOpts = (WORLDS||Array.from({length:10},(_,i)=>({id:i+1,name:`Welt ${i+1}`,icon:'🌍'}))).map(w=>`<option value="${w.id}">${w.icon} ${w.name}</option>`).join('');
    const taskOpts  = Array.from({length:10},(_,i)=>`<option value="${i}">Ab Aufgabe ${i+1}</option>`).join('');
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>↩️ Aufgaben zurücksetzen für ${name}</h3>
      <label>Welt</label>
      <select id="m-rw">${worldOpts}</select>
      <label>Zurücksetzen ab Aufgabe</label>
      <select id="m-rt">${taskOpts}</select>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.4);margin-bottom:10px">Alle Aufgaben ab dieser werden auf "offen" gesetzt.</div>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._resetTasks('${name}')">Zurücksetzen</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _resetTasks(name) {
    const w = parseInt(document.getElementById('m-rw')?.value||1);
    const t = parseInt(document.getElementById('m-rt')?.value||0);
    await State.resetTasksFromIndex(name, w, t);
    this._close();
    await this.showDashboard();
  },

  async resetFull(name) {
    if (confirm(`Kompletten Fortschritt von "${name}" zurücksetzen?\nAlle Punkte und Aufgaben werden gelöscht!`)) {
      await State.resetPlayerProgress(name);
      await this.showDashboard();
    }
  },

  async deletePlayer(name) {
    if (confirm(`Spieler "${name}" LÖSCHEN?\nDies kann nicht rückgängig gemacht werden!`)) {
      await State.deletePlayer(name);
      await this.showDashboard();
    }
  },

  showBroadcast() {
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>📢 Nachricht an alle Spieler</h3>
      <p style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
        Alle Spieler sehen diese Nachricht wenn sie den Shop öffnen oder das Spiel laden.
      </p>
      <label>Nachrichtentext</label>
      <input type="text" id="bc-text" placeholder="z.B. Heute 2× Punkte-Event!" style="margin-bottom:8px"/>
      <label>Gültig für</label>
      <select id="bc-dur" style="margin-bottom:14px">
        <option value="${30*60*1000}">30 Minuten</option>
        <option value="${2*60*60*1000}" selected>2 Stunden</option>
        <option value="${24*60*60*1000}">1 Tag</option>
        <option value="${7*24*60*60*1000}">1 Woche</option>
      </select>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._sendBroadcast()">Senden 📢</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _sendBroadcast() {
    const text = document.getElementById('bc-text')?.value?.trim();
    const dur = parseInt(document.getElementById('bc-dur')?.value || 0);
    if (!text) { alert('Bitte Text eingeben!'); return; }
    await State.setBroadcast(text, dur);
    this._close();
    // Show locally immediately
    if (window.showBroadcastBanner) showBroadcastBanner(text);
    alert('✅ Nachricht gesendet an alle Spieler weltweit!');
  },

  showZooPanel() {
    const ANIMALS_ADMIN = [
      {id:'cat',n:'Katze',e:'🐱',r:'Normal'},{id:'dog',n:'Hund',e:'🐶',r:'Normal'},
      {id:'hamster',n:'Hamster',e:'🐹',r:'Normal'},{id:'fish',n:'Fisch',e:'🐠',r:'Selten'},
      {id:'kangaroo',n:'Känguru',e:'🦘',r:'Selten'},{id:'frog',n:'Frosch',e:'🐸',r:'Episch'},
      {id:'raccoon',n:'Waschbär',e:'🦝',r:'Episch'},{id:'dolphin',n:'Delphin',e:'🐬',r:'Episch'},
      {id:'wolf',n:'Wolf',e:'🐺',r:'Episch'},{id:'fox',n:'Fuchs',e:'🦊',r:'Legendär'},
      {id:'tiger',n:'Tiger',e:'🐯',r:'Legendär'},{id:'orca',n:'Orca',e:'🐳',r:'Ultra'},
      {id:'lion',n:'Löwe',e:'🦁',r:'Gott'},{id:'mammoth',n:'Mammut',e:'🦣',r:'Gott'},
      {id:'dino',n:'Dinosaurier',e:'🦕',r:'SECRET'},{id:'megalodon',n:'Megalodon',e:'🦈',r:'SECRET'},
    ];
    const EVENTS_ADMIN = [
      {id:'snow',n:'❄️ Schneesturm'},{id:'party',n:'🎉 Party'},
      {id:'golden',n:'✨ Goldregen'},{id:'night',n:'🌙 Magische Nacht'},
      {id:'rush',n:'🏃 Rush Hour'},{id:'mega',n:'💎 Mega Event'},
      {id:'hunt',n:'🎯 Jagdfieber'},{id:'glitch',n:'👾 Glitch'},
    ];
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:440px">
      <h3>🦁 Zoo-Admin Befehle</h3>
      <p style="font-size:0.78rem;color:rgba(255,255,255,0.45);margin-bottom:12px">
        Diese Befehle werden in der Zoo-Welt angewendet. Der Ziel-Spieler muss im Zoo aktiv sein.
      </p>
      <label>Ziel-Spieler</label>
      <input type="text" id="za-player" placeholder="Spielername" style="margin-bottom:8px"/>
      <label>Tier spawnen</label>
      <select id="za-animal" style="margin-bottom:8px">
        ${ANIMALS_ADMIN.map(a=>`<option value="${a.id}">${a.e} ${a.n} (${a.r})</option>`).join('')}
      </select>
      <label>Shiny für Tier</label>
      <select id="za-shiny" style="margin-bottom:8px">
        <option value="">Kein Shiny</option>
        <option value="gold">GOLD (×1.5)</option>
        <option value="diamond">DIAMOND (×2)</option>
        <option value="rainbow">RAINBOW (×3)</option>
        <option value="void">VOID (×5)</option>
        <option value="glitch">GLITCH (×4)</option>
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <button class="mb-ok" onclick="Admin._zooSpawnAnimal()">🦁 Tier spawnen</button>
        <button class="mb-cancel" style="background:rgba(0,207,255,.15);border-color:rgba(0,207,255,.4);color:#00CFFF" onclick="Admin._zooGiveMT()">🌀 +50.000 MT geben</button>
      </div>
      <label>Event starten</label>
      <select id="za-event" style="margin-bottom:8px">
        ${EVENTS_ADMIN.map(e=>`<option value="${e.id}">${e.n}</option>`).join('')}
      </select>
      <label>Event-Dauer</label>
      <select id="za-evdur" style="margin-bottom:12px">
        <option value="10000">10 Sekunden (Test)</option>
        <option value="30000" selected>30 Sekunden</option>
        <option value="60000">1 Minute</option>
        <option value="120000">2 Minuten</option>
        <option value="300000">5 Minuten</option>
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <button class="mb-ok" style="background:rgba(231,76,60,.3);border-color:rgba(231,76,60,.5);color:#ff6b6b" onclick="Admin._zooStartEvent()">⚡ Event starten</button>
        <button class="mb-cancel" onclick="Admin._zooGiveRebirth()">🔄 Reset schenken</button>
      </div>
      <button class="mb-cancel" onclick="Admin._close()">Schliessen</button>
    </div>`);
  },

  async _zooSpawnAnimal() {
    const playerName = document.getElementById('za-player')?.value?.trim();
    const animalId = document.getElementById('za-animal')?.value;
    const shinyId = document.getElementById('za-shiny')?.value;
    if (!playerName) { alert('Bitte Spielernamen eingeben!'); return; }
    // Write to Firebase for Zoo to pick up
    const cmd = {
      type: 'spawn_animal',
      target: playerName.toLowerCase(),
      animalId, shinyId,
      id: Date.now().toString(),
      expiresAt: Date.now() + 30000
    };
    if (State._useCloud()) {
      await _db.collection('config').doc('zoo_admin_cmd').set(cmd);
    }
    localStorage.setItem('zoo_admin_cmd', JSON.stringify(cmd));
    this._close();
    alert(`✅ Spawn-Befehl für ${playerName} gesendet! Sie sehen das Tier beim nächsten Gondel-Zyklus.`);
  },

  async _zooGiveMT() {
    const playerName = document.getElementById('za-player')?.value?.trim();
    if (!playerName) { alert('Bitte Spielernamen eingeben!'); return; }
    const cmd = { type:'give_mt', target:playerName.toLowerCase(), amount:50000, id:Date.now().toString(), expiresAt:Date.now()+30000 };
    if (State._useCloud()) await _db.collection('config').doc('zoo_admin_cmd').set(cmd);
    localStorage.setItem('zoo_admin_cmd', JSON.stringify(cmd));
    this._close();
    alert(`✅ +50.000 MT für ${playerName} gesendet!`);
  },

  async _zooStartEvent() {
    const evId = document.getElementById('za-event')?.value;
    const dur = parseInt(document.getElementById('za-evdur')?.value || 30000);
    const cmd = { type:'start_event', eventId:evId, dur, id:Date.now().toString(), expiresAt:Date.now()+60000 };
    if (State._useCloud()) await _db.collection('config').doc('zoo_admin_cmd').set(cmd);
    localStorage.setItem('zoo_admin_cmd', JSON.stringify(cmd));
    this._close();
    alert(`✅ Event ${evId} gestartet für ${dur/1000}s!`);
  },

  async _zooGiveRebirth() {
    const playerName = document.getElementById('za-player')?.value?.trim();
    if (!playerName) { alert('Bitte Spielernamen eingeben!'); return; }
    const key = 'zoo_' + playerName.toLowerCase();
    let zoo = null;
    try { if (State._useCloud()) { const s = await _db.collection('zoos').doc(key).get(); if(s.exists) zoo=s.data(); } } catch(e) {}
    if (!zoo) { const l = localStorage.getItem(key); zoo = l ? JSON.parse(l) : null; }
    if (!zoo) { alert('Zoo nicht gefunden!'); return; }
    zoo.rebirths = (zoo.rebirths||0) + 1;
    zoo.rebirthMult = Math.round((1 + zoo.rebirths * 0.5)*100)/100;
    try { if (State._useCloud()) await _db.collection('zoos').doc(key).set(zoo); } catch(e) {}
    localStorage.setItem(key, JSON.stringify(zoo));
    this._close();
    alert(`✅ Reset für ${playerName} geschenkt! Neuer Mult: ×${zoo.rebirthMult}`);
  },

  showChangePw() {
    const pw = prompt('Neues Admin-Passwort (min. 4 Zeichen):');
    if (pw && pw.length >= 4) { State.setAdminPw(pw); alert('✅ Passwort gespeichert!'); }
    else if (pw !== null) alert('Zu kurz!');
  },

  // ---- DISCOUNT / RABATT ----
  showDiscountPanel() {
    const discounts = JSON.parse(localStorage.getItem('mischa_discounts') || '{}');
    const now = Date.now();
    const SHOP_ITEM_NAMES = {
      starter_pack:'🎁 Starterpaket', joker_x2:'🃏🃏 2× Joker', joker_x3:'🃏🃏🃏 3× Joker',
      boost_2x_15:'⭐×2 15Min', boost_4x_15:'⭐×4 15Min', boost_10x_15:'🌟×10 15Min',
      boost_10x_30:'🌟×10 30Min', boost_10x_60:'🌟×10 1h',
      skin_swimmer:'🏊 Schwimmer', skin_og:'👴 OG-Mann', skin_dev:'💻 Entwickler',
      extra_world_unlock:'🔓 Welt freischalten', extra_score_shield:'🛡️ Punkte-Schutz',
      extra_hint:'💡 Hinweis-Paket', admin_week:'🔐 Admin-Zugang',
    };
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:420px">
      <h3>🏷️ Rabatt verwalten</h3>
      <p style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:12px">
        Aktive Rabatte werden für alle Spieler im Shop angezeigt.
      </p>

      <!-- Active discounts -->
      <div id="disc-active" style="margin-bottom:14px">
        ${Object.entries(discounts).filter(([,d])=>d.expiresAt>now).length === 0
          ? '<div style="color:rgba(255,255,255,0.3);font-size:0.8rem">Keine aktiven Rabatte</div>'
          : Object.entries(discounts).filter(([,d])=>d.expiresAt>now).map(([id,d])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;
              background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);
              border-radius:8px;padding:7px 10px;margin-bottom:5px;font-size:0.78rem;color:white">
              <span>${SHOP_ITEM_NAMES[id]||id} — <b style="color:#FFD700">-${d.pct}%</b></span>
              <span style="color:rgba(255,255,255,0.4)">läuft ab: ${new Date(d.expiresAt).toLocaleDateString('de-CH')}</span>
            </div>`).join('')
        }
      </div>

      <!-- Add new discount -->
      <label>Artikel</label>
      <select id="disc-item" style="margin-bottom:8px">
        ${Object.entries(SHOP_ITEM_NAMES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
      </select>

      <label>Rabatt %</label>
      <input type="number" id="disc-pct" value="20" min="1" max="90" style="margin-bottom:8px"/>

      <label>Gültig für</label>
      <select id="disc-dur" style="margin-bottom:14px">
        <option value="${60*60*1000}">1 Stunde</option>
        <option value="${6*60*60*1000}">6 Stunden</option>
        <option value="${24*60*60*1000}" selected>1 Tag</option>
        <option value="${3*24*60*60*1000}">3 Tage</option>
        <option value="${7*24*60*60*1000}">1 Woche</option>
        <option value="${30*24*60*60*1000}">1 Monat</option>
      </select>

      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._saveDiscount()">Rabatt aktivieren</button>
        <button class="mb-cancel" onclick="Admin._close()">Schliessen</button>
      </div>
    </div>`);
  },

  async _saveDiscount() {
    const item = document.getElementById('disc-item')?.value;
    const pct  = parseInt(document.getElementById('disc-pct')?.value || 0);
    const dur  = parseInt(document.getElementById('disc-dur')?.value || 0);
    const adminName = State.currentPlayer?.name || 'Admin';
    if (!item || !pct || !dur) return;
    await State.setDiscount(item, pct, dur);
    // Auto-broadcast discount as message
    const NAMES = {starter_pack:'Starterpaket',joker_x2:'2× Joker',boost_2x_15:'2× Sterne 15Min',boost_4x_15:'4× Sterne 15Min',boost_10x_15:'10× Sterne 15Min',skin_swimmer:'Schwimmer-Skin',admin_week:'Admin-Zugang',extra_world_unlock:'Welt freischalten',extra_hint:'Hinweis-Paket'};
    const itemName = NAMES[item] || item;
    await State.setBroadcast(`Admin ${adminName} hat für "${itemName}" ${pct}% Rabatt hinzugefügt!`, dur, 'info');
    if (window.showBroadcastBanner) showBroadcastBanner(`Admin ${adminName} hat für "${itemName}" ${pct}% Rabatt hinzugefügt!`);
    this._close();
    alert('✅ Rabatt aktiviert + Nachricht gesendet!');
  },

  // ---- SURVEY ----
  showSurveyPanel() {
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>📊 Umfrage senden</h3>
      <p style="font-size:0.78rem;color:rgba(255,255,255,0.45);margin-bottom:10px">Alle Spieler sehen die Umfrage sofort. Sie haben 20 Sekunden zum Abstimmen.</p>
      <label>Frage</label>
      <input type="text" id="sv-q" placeholder="Macht ihr gerne Sport?" style="margin-bottom:8px"/>
      <label>Antwort Grün (links)</label>
      <input type="text" id="sv-a" placeholder="Ja!" style="margin-bottom:8px"/>
      <label>Antwort Rot (rechts)</label>
      <input type="text" id="sv-b" placeholder="Nein!" style="margin-bottom:14px"/>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._sendSurvey()">Senden 📊</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _sendSurvey() {
    const q  = document.getElementById('sv-q')?.value?.trim();
    const a  = document.getElementById('sv-a')?.value?.trim() || 'Ja';
    const b  = document.getElementById('sv-b')?.value?.trim() || 'Nein';
    if (!q) { alert('Bitte Frage eingeben!'); return; }
    await State.setBroadcast(q, 25000, 'survey', { optA: a, optB: b });
    if (window.showSurvey) showSurvey({ text:q, id: Date.now().toString(), type:'survey', extra:{optA:a,optB:b}, expiresAt:Date.now()+25000 });
    this._close();
    alert('✅ Umfrage gesendet! Spieler haben 20 Sekunden.');
  },

  // ---- GIFT RESET ----
  showGiftReset(playerName) {
    const player = playerName;
    this._modal(`<div class="modal-box" onclick="event.stopPropagation()">
      <h3>🔄 Reset schenken</h3>
      <p style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:12px">
        Schenke <b style="color:white">${player}</b> einen Reset.<br>
        Der Spieler startet von vorne mit einem höheren Multiplikator (×1.3 pro Reset).
      </p>
      <div class="mbtns">
        <button class="mb-ok" onclick="Admin._doGiftReset('${player}')">Reset schenken 🎁</button>
        <button class="mb-cancel" onclick="Admin._close()">Abbrechen</button>
      </div>
    </div>`);
  },

  async _doGiftReset(playerName) {
    const ok = await State.giftReset(playerName);
    this._close();
    if (ok) alert(`✅ Reset geschenkt! ${playerName} startet neu mit ×1.3 Bonus.`);
    else alert('❌ Spieler nicht gefunden!');
    await this.showDashboard();
  }
};

// Boot
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    Admin.render();
    // Listen for real-time discounts from Firestore
    State.listenDiscounts(() => {});
  }, 300);
});
</script>
</body>
</html>
